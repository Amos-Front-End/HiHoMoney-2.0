<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>HiHoMoney 2.0 - 陪你一起實踐 FIRE 運動</title>
</head>
<body class="bg-slate-50">

  <section class="relative flex min-h-[600px] items-center overflow-hidden bg-slate-50 px-6 py-12 md:py-20">
    <div class="absolute right-0 top-0 h-full w-1/3 -translate-x-1/4 -skew-x-12 bg-emerald-500/5 transition-all duration-1000"></div>
    <div class="relative z-10 mx-auto grid max-w-6xl grid-cols-1 items-center gap-12 lg:grid-cols-2">
      <header class="space-y-8 text-center md:text-left">
        <div class="inline-block rounded-full bg-emerald-100 px-4 py-2 text-sm font-bold text-emerald-700">🔥 FIRE 運動實踐中</div>
        <h1 class="text-5xl font-black leading-[1.1] text-slate-900 md:text-7xl">
          陪你一起實踐 <br>
          <span class="text-6xl italic text-emerald-500 md:text-8xl">FIRE</span> 
          <span class="text-slate-800">運動</span>
        </h1>
        <p class="mx-auto max-w-md text-xl leading-relaxed text-slate-600 md:mx-0">
          財務自由、提早退休。我們不僅提供知識，更提供工具與策略，讓你拿回生活的主控權。
        </p>
        <div class="flex flex-col gap-4 sm:flex-row justify-center md:justify-start">
          <button class="rounded-2xl bg-slate-900 px-8 py-4 text-lg font-bold text-white shadow-xl shadow-slate-900/20 transition-all hover:bg-slate-800 active:scale-95">免費加入社群</button>
          <button class="rounded-2xl border-2 border-slate-200 bg-white px-8 py-4 text-lg font-bold text-slate-600 transition-all hover:border-emerald-500 hover:text-emerald-500 active:scale-95">探索理財工具</button>
        </div>
      </header>
      <div class="hidden justify-center lg:flex">
        <div class="flex h-80 w-80 rotate-3 items-center justify-center rounded-[4rem] bg-white text-9xl shadow-2xl transition-transform duration-700 hover:rotate-0">💰</div>
      </div>
    </div>
  </section>
</body>
</html>
